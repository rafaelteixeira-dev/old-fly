<main class="container">
    <section class="cadastro">
        <h2>Cadastro de Alunos</h2>

        <input type="text" id="nome" placeholder="Digite o nome do aluno">
        <input type="number" id="idade" placeholder="Digite a idade">
        <input type="text" id="turma" placeholder="Digite a turma">
        <input type="text" id="curso" placeholder="Digite o curso">
        <input type="text" id="matricula" placeholder="Digite a matrícula">

        <button onclick="adicionar()">Cadastrar</button>
    </section>

    <section class="lista-alunos">
        <h2>Alunos Cadastrados:</h2>
        <ul id="lista"></ul>
    </section>
</main>
